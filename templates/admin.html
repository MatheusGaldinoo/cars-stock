<!DOCTYPE html>
<html>
<head>
    <title>Cadastro de Carros</title>
</head>
<body>

    <h1>Cadastro de Carros</h1>

    <form action="/cars?acesso=liberado" method="post">
        
        <input type="text" name="placa" placeholder="Placa"><br><br>
        <input type="text" name="modelo" placeholder="Modelo"><br><br>
        <input type="text" name="marca" placeholder="Marca"><br><br>
        <input type="number" name="ano" placeholder="Ano"><br><br>
        <input type="number" step="0.01" name="preco" placeholder="Preço"><br><br>
        <input type="checkbox" name="disponibilidade" value="true" checked> Disponível<br><br>

        <button type="submit">Cadastrar</button>

    </form>

</body>
</html>
